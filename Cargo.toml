[workspace]
resolver = "2"
members = [
    "crates/recorder",
    "crates/replay",
    "crates/decoder",
    "crates/dap",
    "crates/mirrorscope-cli",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
repository = "https://github.com/chayan-bit/Mirrorscope"
rust-version = "1.85"

[workspace.dependencies]
recorder = { path = "crates/recorder" }
replay = { path = "crates/replay" }
decoder = { path = "crates/decoder" }
dap = { path = "crates/dap" }
crc32fast = "1"
thiserror = "2"

[workspace.lints.rust]
unsafe_code = "warn"
missing_docs = "warn"

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
unwrap_used = "warn"

name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: fmt + clippy + test (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86-64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy

      - uses: Swatinem/rust-cache@v2

      - name: rustfmt
        run: cargo fmt --all --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: build
        run: cargo build --workspace --all-targets

      - name: test
        run: cargo test --workspace

      - name: build mirrorscope-cli with the ebpf feature
        run: cargo build -p mirrorscope-cli -p recorder-ebpf --features ebpf

  # The BPF kernel-side programs (crates/recorder-ebpf-programs) are a
  # separate, workspace-excluded project needing nightly + bpf-linker (issue
  # #14). Best-effort only: never blocks the required `check` job above.
  ebpf-programs:
    name: recorder-ebpf-programs (best-effort)
    runs-on: ubuntu-24.04
    continue-on-error: true
    defaults:
      run:
        working-directory: crates/recorder-ebpf-programs
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly + rust-src
        run: rustup toolchain install nightly --profile minimal --component rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/recorder-ebpf-programs

      # Default features (`rust-llvm-*` via `aya-rustc-llvm-proxy`) link
      # against the exact LLVM the installed nightly rustc bundles, avoiding
      # a system-LLVM/rustc-LLVM version mismatch ("ERROR llvm: Invalid
      # record" from bpf-linker) — verified in local Docker testing that a
      # system-LLVM build (`--no-default-features --features llvm-N`) is
      # fragile against nightly's fast-moving internal LLVM version.
      - name: Install bpf-linker
        run: cargo +nightly install bpf-linker

      - name: build (x86_64 pt_regs layout)
        run: cargo +nightly build --release --features x86_64
